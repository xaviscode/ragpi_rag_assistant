services:
  ragpi:
    build: .
    container_name: ragpi
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
